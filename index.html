    <title>partyClock</title>
    <script src="script.js"></script>

</head>
<body>
    <div class="center">
        <div id="banner">
            <span style="float: right;">clock.<a href="https://aivi.party/">aivi.party</a></span>
            <nobr><span id="localTZLabel">Device Offset</span> <small><span id="localOffsetLabel"></span></small></nobr>
            <div>
                <table>
                    <tr>
                        <td style="background-color: var(--bg);">
                            <nobr><i><span class="displayTime large hhmm" id="localTime"></span><span style="display: inline-block;" class="displayTime medium ss" id="localTimeSec"></span></i></nobr>
                        </td>
                        <td style="text-align: right; width: 120px; padding: 5px 15px;">
                            <small><nobr><span class="">24h</span> <span class="unselected">12h</span></nobr><br><nobr><span class="unselected">light</span> <span class="unselected">dark</span> <span class="">auto</span></nobr><br><nobr><span class="">digital</span> <span class="unselected">analog</span></nobr></small>
                        </td>
                    </tr>
                </table>
            </div>
        </div>
        <div style="height: 30px;"></div>
        <table>
            <tr>
                <td>
                    <span><small>IANA timezone</small></span>
                    <br>
                    <input id="tzInput" name="tz" placeholder="Search">
                    <button type="button" onclick="addClock(document.getElementById('tzInput').value);">+ Add</button>
                </td>
            </tr>
        </table>
        <div style="height: 30px;"></div>
        <table id="clockContainer"></table>
    </div>
    <div style="height: 200px;"></div>
