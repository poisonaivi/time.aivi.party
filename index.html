<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.5">
    <title>partyClock</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="center">
        <div id="banner">
            <span style="float: right;">time.<a href="https://aivi.party/">aivi.party</a></span>
            <nobr><span id="localTZLabel">Device Offset</span> <small><span id="localOffsetLabel"></span></small></nobr>
            <div>
                <table>
                    <tr>
                        <td class="bigClockContainer">
                            <nobr><i><span class="displayTime large hhmm" id="localTime"></span><span style="display: inline-block;" class="displayTime medium ss" id="localTimeSec"></span></i></nobr>
                        </td>
                        <td style="text-align: right; width: 120px; padding: 5px 15px;">
                            <small><nobr><span class="action hours" onclick="updateHours(12)">12h</span> <span class="unselected hours action" onclick="updateHours(24)">24h</span></nobr><br><nobr><span class="unselected theme action" onclick="updateTheme('light')">light</span> <span class="unselected theme action" onclick="updateTheme('dark')">dark</span> <span class="theme action" onclick="updateTheme('auto')">auto</span></nobr><br><nobr><span class="action">digital</span> <span class="unselected action"><s>analog</s></span></nobr></small>
                        </td>
                    </tr>
                </table>
            </div>
        </div>
        <div style="height: 30px;"></div>
        <table>
            <tr>
                <td>
                    <form onsubmit="addClock(document.getElementById('tzInput').value.replaceAll(' ', '_')); return false;">
                        <label for="tz"><small>IANA timezone identifier</small></label>
                        <br>
                        <input name="tz" id="tzInput" placeholder="Search">
                        <button type="submit">+ Add</button>
                        <div id="notificationContainer"></div>
                    </form>
                </td>
            </tr>
        </table>
        <div style="height: 30px;"></div>
        <div style="text-align: left;"><small><span class="action" onclick="toggleEdit();">edit</span>&nbsp;&nbsp;<span class="action" onclick="removeAllClocks();">clear</span>&nbsp;&nbsp;<span class="action" onclick="storeTZs();">save</span>&nbsp;&nbsp;<span class="action" onclick="retrieveTZs()">load</span>&nbsp;&nbsp;<span class="action" onclick="clearTZs();">forget</span></small></div>
        <table id="clockContainer"></table>
        <div style="text-align: left;"><small><span class="action" onclick="toggleEdit();">edit</span>&nbsp;&nbsp;<span class="action" onclick="removeAllClocks();">clear</span>&nbsp;&nbsp;<span class="action" onclick="storeTZs();">save</span>&nbsp;&nbsp;<span class="action" onclick="retrieveTZs()">load</span>&nbsp;&nbsp;<span class="action" onclick="clearTZs();">forget</span></small></div>
    </div>
    <div style="height: 200px;"></div>
    
    To-do:
    <ul>
        <li>timezone picker</li>
        <li>share timezone by link</li>
        <li>analog clock</li>
    </ul>
    <script>
        setLocalTZ();
        clockTick();
        retrieveTZs();
        updateTheme();
        updateHours();
    </script>
</body>
</html>
